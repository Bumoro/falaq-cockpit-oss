<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat with Claude</title>
<style>
:root{color-scheme:light dark;
  --bg:#F5F5F7;--surface:#FFFFFF;--surface-2:#FBFBFD;
  --ink:#1D1D1F;--ink-2:#6E6E73;--ink-3:#6E6E73;
  --line:#D2D2D7;--line-2:#E8E8ED;
  --blue:#0071E3;--blue-press:#0062C4;--link:#0066CC;
  --green:#0E8043;--amber:#8A5A00;--red:#CE2E24;--gray:#5F5F64;
  --green-bg:#E8F6EE;--amber-bg:#FBF1DD;--blue-bg:#E9F1FD;
  --radius:18px;--radius-sm:12px;
  --shadow:0 4px 24px -10px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.04);
  --shadow-lift:0 12px 40px -14px rgba(0,0,0,.22),0 2px 4px rgba(0,0,0,.05);
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;}
@media (prefers-color-scheme:dark){:root{
  --bg:#000000;--surface:#1C1C1E;--surface-2:#161617;
  --ink:#F5F5F7;--ink-2:#A1A1A6;--ink-3:#8A8A8E;
  --line:#38383C;--line-2:#2A2A2C;
  --blue:#0A70E0;--blue-press:#0060DF;--link:#2997FF;
  --green:#30D158;--amber:#FFB340;--red:#FF453A;--gray:#8A8A8E;
  --green-bg:#12301B;--amber-bg:#332609;--blue-bg:#0A2646;
  --shadow:0 8px 30px -12px rgba(0,0,0,.6);--shadow-lift:0 16px 44px -14px rgba(0,0,0,.7);}}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 var(--sans);letter-spacing:-.01em;-webkit-font-smoothing:antialiased}button,textarea{font:inherit;letter-spacing:inherit}.shell{height:100%;max-width:720px;margin:auto;display:flex;flex-direction:column}.offline{display:none;background:var(--amber-bg);color:var(--amber);text-align:center;padding:6px 16px;font-size:13px}.offline.on{display:block}
header{position:sticky;top:0;z-index:2;background:color-mix(in srgb,var(--bg) 72%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line-2);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}h1{font-size:17px;font-weight:600;letter-spacing:-.02em;margin:0}.back{color:var(--link);text-decoration:none;font-size:13px;margin-right:10px}.title{display:flex;align-items:center;min-width:0}.pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:2px 9px;color:var(--ink-3);font-size:12px;white-space:nowrap}.dot{width:7px;height:7px;border-radius:50%;background:var(--gray)}.pill.running .dot{background:var(--green);animation:pulse 1.3s infinite}.pill.needs_you .dot{background:var(--amber)}@keyframes pulse{50%{opacity:.35}}
#messages{flex:1;overflow:auto;padding:22px 16px}.row{display:flex;margin:0 0 13px}.row.you{justify-content:flex-end}.bubble{max-width:82%;padding:10px 14px;border-radius:var(--radius);white-space:pre-wrap;overflow-wrap:break-word}.you .bubble{background:var(--blue);color:#fff;border-bottom-right-radius:4px}.claude .bubble{background:var(--surface);border:1px solid var(--line-2);color:var(--ink);border-bottom-left-radius:4px}.sending{opacity:.55}.tools{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}.tool{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;font-size:12px;color:var(--ink-3);padding:2px 10px;white-space:normal}.tool .dot.done{background:var(--green)}.tool .dot.error{background:var(--red)}.tool .dot.running{background:var(--amber);animation:pulse 1.3s infinite}
.card{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:14px;margin:18px 0}.pending{border-left:3px solid var(--blue)}.waiting{border-left:3px solid var(--amber);color:var(--amber)}.question{font-weight:600;margin-bottom:10px;white-space:pre-wrap}.options{display:grid;gap:8px}.option{min-height:40px;border:1px solid var(--blue);border-radius:var(--radius-sm);background:transparent;color:var(--link);cursor:pointer;text-align:left;padding:8px 12px}.option.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.option:disabled{opacity:.5;cursor:default}.option:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
#composer{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line-2);padding:12px 16px;display:flex;flex-wrap:wrap;gap:9px;align-items:flex-end}#composer[hidden]{display:none}textarea{flex:1;resize:none;min-height:44px;max-height:130px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;color:var(--ink);outline:none}textarea:focus{border-color:var(--blue)}textarea:focus-visible{outline:2px solid var(--blue);outline-offset:2px}textarea:disabled{opacity:.55}.send,.attach-button{height:44px;border:0;border-radius:980px;cursor:pointer}.send{background:var(--blue);color:#fff;padding:0 17px}.send:hover{background:color-mix(in srgb,var(--blue) 88%,#000)}.attach-button{width:44px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);font-size:18px}.attach-button:hover{border-color:var(--blue);color:var(--link)}.send:disabled,.attach-button:disabled{opacity:.55;cursor:default}.upload-error{flex-basis:100%;margin:0;color:var(--red);font-size:12px;line-height:1.3}.ended{padding:16px;text-align:center;color:var(--ink-3);border-top:1px solid var(--line)}
.picker{padding:20px 16px}.intro{color:var(--ink-3);margin:2px 0 18px}.chat-card{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color .2s ease,box-shadow .2s ease}.chat-card:hover{border-color:var(--blue);box-shadow:var(--shadow-lift)}.chat-name{font-weight:600;color:var(--ink);overflow-wrap:anywhere}.open{border:0;border-radius:980px;background:var(--blue);color:#fff;padding:8px 15px;cursor:pointer}.open:hover{background:color-mix(in srgb,var(--blue) 88%,#000)}.empty{text-align:center;color:var(--ink-3);padding:50px 15px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div class="shell">
  <div id="offline" class="offline">Reconnecting…</div>
  <header><div class="title"><a id="back" class="back" href="/chat" hidden>All chats</a><h1 id="heading">Chats</h1></div><span id="state"></span></header>
  <main id="messages"><div class="empty">Loading…</div></main>
  <form id="composer" onsubmit="send();return false" hidden><textarea id="input" maxlength="4000" placeholder="Message Claude…" aria-label="Message Claude"></textarea><button id="attachButton" class="attach-button" type="button" aria-label="Attach files" title="Attach files">📎</button><input id="fileInput" type="file" multiple hidden><button id="sendButton" class="send" type="submit">Send</button><p id="uploadError" class="upload-error" role="status" hidden></p></form>
  <div id="ended" class="ended" hidden>This chat has ended.</div>
</div>
<script>
const CK_NAME=/^ck-[a-z0-9-]{1,40}$/;
// A chat name only ever flows into an /api/chats/<name>/… path. Validate the URL param up front so a
// malformed ?name= (slashes, a query/fragment, quotes) can NEVER be spliced into a fetch path or the
// DOM — an invalid value falls back to the picker instead. Every fetch still encodeURIComponent's it.
let TOKEN='', NAME=(new URLSearchParams(location.search).get('name')||'').trim(), lastJSON='', failCount=0, sending=false, uploading=false;
if(NAME && !CK_NAME.test(NAME)){ NAME=''; try{history.replaceState(null,'','/chat');}catch(e){} }
fetch('/api/token').then(r=>r.text()).then(t=>{TOKEN=t; tick();}).catch(()=>{});
function H(){return {'x-cockpit-token':TOKEN,'Content-Type':'application/json'};}
function esc(x){return String(x).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function api(path){return '/api/chats/'+encodeURIComponent(NAME)+path;}

const TOOL_VERB = { Bash:'Running a command', Read:'Reading a file', Write:'Editing a file', Edit:'Editing a file',
  Grep:'Searching the code', Glob:'Searching the code', WebFetch:'Reading a web page', WebSearch:'Searching the web',
  Task:'Working with a helper', Agent:'Working with a helper', Skill:'Using a skill', TodoWrite:'Planning',
  TaskCreate:'Planning', TaskUpdate:'Planning', AskUserQuestion:'Asking a question', Workflow:'Coordinating helpers' };
function toolVerb(name){ if(TOOL_VERB[name]) return TOOL_VERB[name]; if(/^mcp__/.test(name)) return 'Using an app'; return name; }
function stateInfo(state, dead){if(dead||state==='ended')return['ended','Ended'];if(state==='running')return['running','Working…'];if(state==='needs_you')return['needs_you','Needs you'];return['idle','Idle'];}
function pill(state, dead){const p=stateInfo(state,dead);return `<span class="pill ${esc(p[0])}"><span class="dot"></span>${esc(p[1])}</span>`;}

async function tick(){
  if(!TOKEN) return;
  try{
    const [sessions, chats] = await Promise.all([
      fetch('/api/sessions').then(r=>r.json()),
      fetch('/api/chats',{headers:H()}).then(r=>r.json()),
    ]);
    failCount=0; setOffline(false);
    if(!NAME){ renderPicker(chats, sessions); return; }
    const chat = chats.find(c=>c.name===NAME);
    // A well-formed but unknown/stale ck-name (no such chat) is NOT sendable — treat it as ended so the
    // composer disables instead of POSTing into the void and leaving an optimistic bubble stuck forever.
    const dead = !chat || chat.alive===false;
    // exact-identity match, prefer a live/newest session (same rule as live.html:202)
    const named = sessions.filter(s=>s.chatName===NAME)
      .sort((a,b)=>((a.state==='ended')-(b.state==='ended'))||((b.lastActivityAt||0)-(a.lastActivityAt||0)));
    const s = named[0]||{};
    renderHeader(chat, s, dead);
    let turns=[];
    if(s.transcriptPath){
      turns = await fetch(api(`/messages?path=${encodeURIComponent(s.transcriptPath)}`),{headers:H()}).then(r=>r.json());
    }
    renderConversation(turns, s);
  }catch(e){ failCount++; if(failCount>=3) setOffline(true); }
}
setInterval(tick, 1500);

function setOffline(on){document.getElementById('offline').classList.toggle('on',on);}
function matchedSession(sessions,name){return sessions.filter(s=>s.chatName===name).sort((a,b)=>((a.state==='ended')-(b.state==='ended'))||((b.lastActivityAt||0)-(a.lastActivityAt||0)))[0]||{};}
function renderPicker(chats,sessions){
  document.getElementById('heading').textContent='Chats';document.getElementById('state').innerHTML='';document.getElementById('back').hidden=true;document.getElementById('composer').hidden=true;document.getElementById('ended').hidden=true;
  const el=document.getElementById('messages');el.className='picker';
  el.innerHTML=`<p class="intro">Choose a conversation to continue with Claude. <button class="open" id="newChatBtn" data-new>+ New chat</button></p>${(chats||[]).length?(chats||[]).map(c=>{const s=matchedSession(sessions,c.name);return `<div class="chat-card"><div><div class="chat-name">${esc(c.title||c.name)}</div>${pill(s.state,c.alive===false)}</div><button class="open" data-open="${esc(c.name)}">Open</button></div>`;}).join(''):'<div class="empty">No chats are available yet.</div>'}`;
}
// Only navigate to a structurally-valid chat name; an odd data-open value resets to the picker.
function openChat(name){ if(CK_NAME.test(name)) location='/chat?name='+encodeURIComponent(name); }
async function startNondevChat(){
  const title=prompt('What should this chat help with?');if(!title)return;
  const r=await fetch('/api/chats',{method:'POST',headers:H(),body:JSON.stringify({title,profile:'nondev',model:'sonnet',effort:'medium'})});
  if(!r.ok){alert('Could not start the chat.');return;}
  const c=await r.json();location='/chat?name='+encodeURIComponent(c.name);
}
function renderHeader(chat,s,dead){document.getElementById('heading').textContent=(chat&&(chat.title||chat.name))||'Chat';document.getElementById('state').innerHTML=pill(s.state,dead);document.getElementById('back').hidden=false;window.chatEnded=!!dead||s.state==='ended';}
function blockHTML(b){
  if(b.type==='text')return `<div>${esc(b.text)}</div>`;
  if(b.type==='tool'){const label=b.label?' · '+b.label:'';return `<div class="tools"><span class="tool"><span class="dot ${esc(b.status)}"></span>${esc(toolVerb(b.name)+label)}</span></div>`;}
  return '';
}
function turnHTML(t){return `<div class="row ${esc(t.role)}"><div class="bubble">${(t.blocks||[]).map(blockHTML).join('')}</div></div>`;}
// Buttons carry their key/name in a data-* attribute (attribute-context esc() IS safe: quotes become
// &quot; and dataset returns the literal string, never eval'd) and are wired via delegation below —
// NO inline onclick, because esc() is an HTML-text escape and the browser HTML-decodes an inline
// handler's attribute before the JS parser sees it, which would let a quote-bearing value break out.
function pendingHTML(p){return `<div id="pendingCard" class="card pending"><div class="question">${esc(p.title||'Claude needs your answer')}</div><div class="options">${(p.options||[]).map((o,i)=>`<button class="option ${i===0?'primary':''}" data-key="${esc(o.key)}" ${sending?'disabled':''}>${esc(o.label)}</button>`).join('')}</div></div>`;}
function renderConversation(turns,s){
  // Composer/ended state reflects liveness on EVERY tick, not only when the message list changes — a
  // chat can die (or become unknown) while turns/pending/state are byte-identical, and the input must
  // still lock. So set it before the cache short-circuit, and fold `ended` into the cache key.
  const ended=!!window.chatEnded;
  document.getElementById('composer').hidden=ended;document.getElementById('ended').hidden=!ended;document.getElementById('input').disabled=ended||sending;document.getElementById('sendButton').disabled=ended||sending||uploading;document.getElementById('attachButton').disabled=ended||sending||uploading;
  const data=JSON.stringify({turns,pending:s.pending||null,state:s.state,ended});if(data===lastJSON)return;lastJSON=data;
  const el=document.getElementById('messages');el.className='';const atBottom=el.scrollTop+el.clientHeight>=el.scrollHeight-60;
  let html=(turns||[]).map(turnHTML).join('');
  if(!sending&&s.pending&&s.pending.kind!=='none')html+=pendingHTML(s.pending);else if(s.state==='needs_you'&&!(s.pending&&s.pending.kind!=='none'))html+='<div class="card waiting">Claude is waiting on something that needs the full cockpit — ping your teammate.</div>';
  el.innerHTML=html||'<div class="empty">This conversation is just getting started.</div>';if(atBottom)el.scrollTop=el.scrollHeight;
}
async function answer(key){if(sending||window.chatEnded||!NAME)return;sending=true;const card=document.getElementById('pendingCard');if(card)card.hidden=true;try{await fetch(api('/keys'),{method:'POST',headers:H(),body:JSON.stringify({key})});}finally{sending=false;lastJSON='';tick();}}
async function send(){
  if(sending||uploading||window.chatEnded||!NAME)return;const input=document.getElementById('input'),text=input.value.trim();if(!text)return;sending=true;input.value='';
  const el=document.getElementById('messages');el.insertAdjacentHTML('beforeend',`<div class="row you sending"><div class="bubble">${esc(text)}<div><small>sending…</small></div></div></div>`);el.scrollTop=el.scrollHeight;input.disabled=true;document.getElementById('sendButton').disabled=true;
  try{await fetch(api('/input'),{method:'POST',headers:H(),body:JSON.stringify({text})});}finally{sending=false;lastJSON='';input.disabled=false;document.getElementById('sendButton').disabled=false;tick();}
}
function readFileBase64(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>{const value=String(reader.result||''),comma=value.indexOf(',');if(comma<0)return reject(new Error('Could not read the file.'));resolve(value.slice(comma+1));};reader.onerror=()=>reject(new Error('Could not read the file.'));reader.readAsDataURL(file);});}
function setUploadError(message){const el=document.getElementById('uploadError');el.textContent=message||'';el.hidden=!message;}
async function uploadFiles(files){
  files=Array.from(files||[]).filter(Boolean);if(!files.length||uploading||window.chatEnded||!NAME)return;
  uploading=true;setUploadError('');const sendButton=document.getElementById('sendButton'),attachButton=document.getElementById('attachButton');sendButton.disabled=true;attachButton.disabled=true;sendButton.textContent='Uploading…';
  try{
    const paths=[];
    for(const file of files){const dataBase64=await readFileBase64(file);const r=await fetch(api('/upload'),{method:'POST',headers:H(),body:JSON.stringify({filename:file.name||'paste.png',dataBase64})});const body=await r.json().catch(()=>({}));if(!r.ok)throw new Error(body.error||'Upload failed.');paths.push(body.path);}
    const input=document.getElementById('input'),prefix=input.value&& !/\s$/.test(input.value)?' ':'',suffix=input.value?' ':'';
    const next=input.value+prefix+paths.join(' ')+suffix;
    if(next.length>4000)throw new Error('Message too long to fit the attachment path — trim the text and paste again.');
    input.value=next;input.focus();
  }catch(e){setUploadError(e.message||'Upload failed.');}
  finally{uploading=false;sendButton.textContent='Send';sendButton.disabled=!!window.chatEnded||sending;attachButton.disabled=!!window.chatEnded||sending;}
}
// One delegated click handler for both surfaces (picker Open + pending options). #messages is the
// stable container; its innerHTML is replaced each render but the listener on the parent survives.
document.getElementById('messages').addEventListener('click',e=>{
  if(e.target.closest('[data-new]')){startNondevChat();return;}
  const op=e.target.closest('[data-open]'); if(op){openChat(op.getAttribute('data-open'));return;}
  const k=e.target.closest('[data-key]'); if(k&&!k.disabled){answer(k.getAttribute('data-key'));return;}
});
document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById('input').addEventListener('input',()=>setUploadError(''));
document.getElementById('input').addEventListener('paste',e=>{const cb=e.clipboardData;if(!cb)return;let files=Array.from(cb.files||[]);if(!files.length)files=Array.from(cb.items||[]).filter(item=>item.kind==='file').map(item=>item.getAsFile()).filter(Boolean);if(!files.length)return;e.preventDefault();uploadFiles(files);});
document.getElementById('attachButton').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',e=>{uploadFiles(e.target.files);e.target.value='';});
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Falaq Cockpit</title>
<style>
:root{color-scheme:light dark;
  --bg:#F5F5F7;--surface:#FFFFFF;--surface-2:#FBFBFD;
  --ink:#1D1D1F;--ink-2:#6E6E73;--ink-3:#6E6E73;
  --line:#D2D2D7;--line-2:#E8E8ED;
  --blue:#0071E3;--blue-press:#0062C4;--link:#0066CC;
  --green:#0E8043;--amber:#8A5A00;--gray:#5F5F64;
  --green-bg:#E8F6EE;--amber-bg:#FBF1DD;--gray-bg:#EFEFF1;--blue-bg:#E9F1FD;
  --radius:18px;--radius-sm:12px;
  --shadow:0 4px 24px -10px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.04);
  --shadow-lift:0 12px 40px -14px rgba(0,0,0,.22),0 2px 4px rgba(0,0,0,.05);
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif}
@media (prefers-color-scheme:dark){:root{
  --bg:#000000;--surface:#1C1C1E;--surface-2:#161617;
  --ink:#F5F5F7;--ink-2:#A1A1A6;--ink-3:#8A8A8E;
  --line:#38383C;--line-2:#2A2A2C;
  --blue:#0A70E0;--blue-press:#0060DF;--link:#2997FF;
  --green:#30D158;--amber:#FFB340;--gray:#8A8A8E;
  --green-bg:#12301B;--amber-bg:#332609;--gray-bg:#1F1F22;--blue-bg:#0A2646;
  --shadow:0 8px 30px -12px rgba(0,0,0,.6);--shadow-lift:0 16px 44px -14px rgba(0,0,0,.7)}}
*{box-sizing:border-box}
html{min-height:100%;background:var(--bg)}
body{min-height:100vh;margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 var(--sans);letter-spacing:-.01em;-webkit-font-smoothing:antialiased}
a{color:inherit}
:focus-visible{outline:3px solid var(--blue);outline-offset:3px;border-radius:10px}
.shell{width:min(100% - 44px,960px);min-height:100vh;margin:auto;display:flex;flex-direction:column}
.brand{height:72px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line-2)}
.brand img{width:30px;height:30px;object-fit:contain}
.brand strong{font-size:18px;font-weight:600;letter-spacing:-.025em}
main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:clamp(52px,9vw,104px) 0}
.eyebrow{margin:0 0 10px;color:var(--ink-2);font-size:15px}
h1{max-width:700px;margin:0 0 clamp(34px,5vw,54px);font-size:clamp(36px,6.3vw,62px);font-weight:600;line-height:1.04;letter-spacing:-.045em;text-wrap:balance}
.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.choice{min-height:210px;padding:24px 24px 22px;border:1px solid var(--line-2);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow);text-decoration:none;display:flex;flex-direction:column;transition:transform .18s cubic-bezier(.22,1,.36,1),box-shadow .18s,border-color .18s}
.choice:hover{transform:translateY(-3px);box-shadow:var(--shadow-lift);border-color:var(--line)}
.choice:active{transform:translateY(-1px)}
.icon{width:42px;height:42px;margin-bottom:auto;border-radius:50%;display:grid;place-items:center;background:var(--tile-bg);color:var(--tile-color);font-size:20px;font-weight:600}
.choice h2{margin:28px 0 5px;font-size:21px;line-height:1.2;font-weight:600;letter-spacing:-.025em}
.choice p{margin:0;color:var(--ink-2);font-size:15px;line-height:1.45}
.choice.chat{--tile-bg:var(--blue-bg);--tile-color:var(--link)}
.choice.live{--tile-bg:var(--amber-bg);--tile-color:var(--amber)}
.choice.phone{--tile-bg:var(--green-bg);--tile-color:var(--green)}
footer{height:72px;border-top:1px solid var(--line-2);display:flex;align-items:center}
footer a{color:var(--link);text-decoration:none;padding:10px 0}
footer a:hover{text-decoration:underline}
@media (max-width:760px){.shell{width:min(100% - 32px,960px)}.brand{height:62px}main{justify-content:flex-start;padding:48px 0 56px}.choices{grid-template-columns:1fr}.choice{min-height:132px;padding:20px;display:grid;grid-template-columns:44px 1fr;grid-template-rows:auto auto;column-gap:16px;align-content:center}.icon{grid-row:1/3;margin:0}.choice h2{margin:0 0 4px}.choice p{grid-column:2}}
@media (max-width:390px){h1{font-size:34px}.choice{padding:18px 16px}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}}
</style>
</head>
<body>
<div class="shell">
  <header class="brand"><img src="/falaq-logo.png" alt=""><strong>Falaq</strong></header>
  <main>
    <p class="eyebrow">Your cockpit</p>
    <h1>What do you want to do?</h1>
    <nav class="choices" aria-label="Cockpit screens">
      <a class="choice chat" href="/chat">
        <span class="icon" aria-hidden="true">✦</span>
        <h2>Chat with Claude</h2>
        <p>Ask for anything — safe mode</p>
      </a>
      <a class="choice live" href="/live">
        <span class="icon" aria-hidden="true">◎</span>
        <h2>Mission Control</h2>
        <p>Watch every session, answer approvals</p>
      </a>
      <a class="choice phone" href="/m">
        <span class="icon" aria-hidden="true">▯</span>
        <h2>Phone view</h2>
        <p>The essentials, sized for your phone</p>
      </a>
    </nav>
  </main>
  <footer><a href="/help">Help</a></footer>
</div>
</body>
</html>
